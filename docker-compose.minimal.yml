# ZeroClaw — Minimal Footprint Compose
#
# Uses the scratch-based image (static binary, no OS layer).
# Targets the smallest compute envelope possible.
#
# Quick start:
#   docker compose -f docker-compose.minimal.yml build
#   API_KEY=sk-... docker compose -f docker-compose.minimal.yml up -d
#
# With Ollama (local LLM, no API key needed):
#   PROVIDER=ollama API_KEY=http://host.docker.internal:11434 \
#     docker compose -f docker-compose.minimal.yml up -d

services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.scratch
    container_name: zeroclaw-minimal
    restart: unless-stopped
    env_file: .env

    environment:
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617

    volumes:
      - zeroclaw-data:/zeroclaw-data

    ports:
      - "${HOST_PORT:-42617}:42617"

    # Tight resource limits — agent runtime, not training
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 32M

    healthcheck:
      test: ["CMD", "/usr/local/bin/zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data:
